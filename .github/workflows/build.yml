name: Build A155F CYG1 KSU-Next + SUSFS
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout fork (submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Dependances de build
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bc bison flex libssl-dev libncurses-dev libelf-dev \
            gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi \
            python3 python-is-python3 curl git zip unzip cpio \
            build-essential ccache openssl

      - name: Recuperer le boot.img CYG1 (ramdisk source, depuis la release)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p samsungbootimg
          gh release download cyg1-boot -R "${{ github.repository }}" \
            -p 'A155F_CYG1_stock_boot.img' -O samsungbootimg/boot.img
          ls -la samsungbootimg/boot.img
          sha256sum samsungbootimg/boot.img

      - name: Integration KernelSU-Next + SUSFS (script du repo)
        run: |
          chmod +x fixesforsma155f.sh
          ./fixesforsma155f.sh

      - name: Compiler le noyau   # [ADAPTER si le build GKI diffère]
        working-directory: Kernel
        run: |
          chmod +x build_kernel.sh
          ./build_kernel.sh 2>&1 | tee ../build.log

      - name: Empaqueter boot.tar (Odin AP)   # [ADAPTER chemin de sortie]
        run: |
          BOOT=$(find . -type f -name boot.img | grep -Ei 'maggi' | head -1)
          [ -z "$BOOT" ] && BOOT=$(find . -type f -name boot.img -newer fixesforsma155f.sh | grep -vi samsungbootimg | head -1)
          echo "boot.img retenu : $BOOT"
          test -n "$BOOT" || { echo '::error::boot.img introuvable - voir logs'; exit 1; }
          cp "$BOOT" boot.img
          tar -H ustar -cf boot.tar boot.img
          sha256sum boot.img boot.tar

      - name: Publier l'artefact
        uses: actions/upload-artifact@v4
        with:
          name: A155F_CYG1_KSUN_SUSFS
          path: |
            boot.tar
            boot.img
            build.log
          if-no-files-found: warn
